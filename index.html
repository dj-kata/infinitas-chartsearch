<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>INFINITAS Chart Search</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
</head>
<body>
  <h1>INFINITAS Chart Search</h1>

  <div id="playmode">
    <span>プレイモード</span>
    <label>
      <input type="radio" name="playmode" value="SP" checked>SP
    </label>
    <label>
      <input type="radio" name="playmode" value="DP">DP
    </label>
  </div>

  <div id="conditions">
    <div id="version">
      <span>バージョン</span>
    </div>
    
    <div id="difficulty">
      <span>難易度</span>
    </div>
    
    <div id="level">
      <span>レベル</span>
    </div>
    
    <div id="notesradar">
      <span>ノーツレーダー</span>
    </div>

    <input id="keyword_songname" placeholder="曲名検索">
  </div>

  <button onclick="search()">検索</button>
  
  <div id="pager"></div>

  <table>
    <thead>
      <tr>
        <th>
          バージョン
          <span class="sortbuttons">
            <button data-col="0" data-order="asc">▲</button>
            <button data-col="0" data-order="desc">▼</button>
          </span>
        </th>
        <th>
          曲名
          <span class="sortbuttons">
            <button data-col="1" data-order="asc">▲</button>
            <button data-col="1" data-order="desc">▼</button>
          </span>
        </th>
        <th>
          難易度
          <span class="sortbuttons">
            <button data-col="2" data-order="asc">▲</button>
            <button data-col="2" data-order="desc">▼</button>
          </span>
        </th>
        <th>
          レベル
          <span class="sortbuttons">
            <button data-col="3" data-order="asc">▲</button>
            <button data-col="3" data-order="desc">▼</button>
          </span>
        </th>
        <th>
          レーダー
          <span class="sortbuttons">
            <button data-col="4" data-order="asc">▲</button>
            <button data-col="4" data-order="desc">▼</button>
          </span>
        </th>
      </tr>
    </thead>
    <tbody id="result"></tbody>
  </table>
</body>
</html>
